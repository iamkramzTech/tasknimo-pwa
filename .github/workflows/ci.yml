name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'   

    - name: Restore dependencies
      run: dotnet restore TaskNimo.sln

    - name: Build
      run: dotnet build TaskNimo.sln --no-restore

    - name: Test
      run: dotnet test TaskNimo.sln --no-build


  validate-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate frontend files exist
      run: |
        echo "Checking frontend structure..."
        test -f frontend/index.html
        echo "Frontend structure OK"